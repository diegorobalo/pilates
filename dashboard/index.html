<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reclamos Dashboard - ArgeSun</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #1e3a8a;
      --primary-light: #3b82f6;
      --primary-dark: #0f172a;
      --danger: #dc2626;
      --warning: #f97316;
      --success: #16a34a;
      --neutral: #64748b;
      --bg-light: #f8fafc;
      --bg-dark: #0f172a;
      --border: #e2e8f0;
    }

    body {
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-light);
      color: #1e293b;
      line-height: 1.6;
    }

    body.dark {
      background: var(--bg-dark);
      color: #f1f5f9;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
